<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kokuu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
:root {
--blue:#00AAFF; --blue-dim:#0066AA; --blue-glow:#44CCFF;
--font-main:"Courier Prime",monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#000;}
::-webkit-scrollbar-thumb{background:#004488;}
body{background:#000;min-height:100vh;font-family:var(--font-main);color:var(--blue);overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.1) 3px,rgba(0,0,0,0.1) 4px);pointer-events:none;z-index:9999;}
.ambient-glow{position:fixed;inset:0;pointer-events:none;z-index:2;}
.ambient-glow::before{content:'';position:absolute;top:-10%;left:-10%;width:50%;height:50%;background:radial-gradient(circle,rgba(0,102,170,0.18) 0%,transparent 70%);filter:blur(40px);}
.ambient-glow::after{content:'';position:absolute;bottom:-10%;right:-10%;width:50%;height:50%;background:radial-gradient(circle,rgba(0,170,255,0.12) 0%,transparent 70%);filter:blur(50px);}
.ambient-glow-extra-left{position:fixed;bottom:-5%;left:-5%;width:40%;height:40%;background:radial-gradient(circle,rgba(0,50,120,0.15) 0%,transparent 65%);filter:blur(35px);pointer-events:none;z-index:2;}
.ambient-glow-extra-right{position:fixed;top:-5%;right:-5%;width:40%;height:40%;background:radial-gradient(circle,rgba(68,204,255,0.1) 0%,transparent 65%);filter:blur(45px);pointer-events:none;z-index:2;}
#starfield{position:fixed;inset:0;z-index:1;pointer-events:none;}
#landing,#site{position:relative;z-index:3;}

/* ══ LANDING ══ */
#landing{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity 0.6s ease,transform 0.6s ease;}
#landing.hidden{opacity:0;transform:scale(1.02);pointer-events:none;}
.landing-title{font-weight:700;font-size:clamp(3.5rem,14vw,7.5rem);color:#fff;text-shadow:0 0 10px rgba(0,170,255,0.9),0 0 25px rgba(0,170,255,0.4);letter-spacing:0.1em;margin-bottom:2px;animation:nebular-glow 4s ease-in-out infinite alternate;}
@keyframes nebular-glow{0%{text-shadow:0 0 10px rgba(0,170,255,0.8),0 0 20px rgba(0,170,255,0.3);opacity:0.93;}100%{text-shadow:0 0 20px rgba(0,170,255,1),0 0 45px rgba(68,204,255,0.7);opacity:1;}}
.landing-verse{font-size:0.9rem;color:var(--blue-dim);letter-spacing:0.1em;margin-bottom:40px;text-align:center;}
.entry-form{display:flex;flex-direction:column;align-items:center;gap:14px;width:280px;}
.entry-label{font-size:0.8rem;color:#004477;letter-spacing:0.05em;text-align:center;}
.entry-input{width:100%;background:transparent;border:none;border-bottom:1px solid #003366;padding:8px 4px;font-family:inherit;font-size:1rem;color:var(--blue);outline:none;text-align:center;letter-spacing:0.1em;transition:border-color 0.2s;caret-color:var(--blue);}
.entry-input::placeholder{color:#002244;}
.entry-input:focus{border-bottom-color:var(--blue);}
.entry-btn{background:transparent;border:1px solid #003366;color:#004477;font-family:inherit;font-size:0.8rem;padding:8px 28px;cursor:pointer;letter-spacing:0.1em;transition:all 0.2s;margin-top:4px;}
.entry-btn:hover{border-color:var(--blue);color:var(--blue);}

/* ══ SITE ══ */
#site{display:none;min-height:100vh;background:rgba(0,0,0,0.4);}
#site.visible{display:block;}
.topbar{border-bottom:1px solid #001a33;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;background:#000;}
.topbar-title{font-size:1.4rem;color:var(--blue);cursor:pointer;user-select:none;transition:transform 0.2s;}
.topbar-title:hover{transform:scale(1.15);text-shadow:0 0 8px var(--blue);}
.topbar-user{font-size:0.8rem;color:#004466;}
.topbar-user span{color:var(--blue-glow);}
.pathbar{background:#000;border-bottom:1px solid #001122;padding:6px 0;font-size:0.8rem;color:#004477;overflow:hidden;white-space:nowrap;}
.marquee-inner{display:inline-block;padding-left:100%;animation:marquee-run 30s linear infinite;}
@keyframes marquee-run{0%{transform:translate3d(0,0,0)}100%{transform:translate3d(-100%,0,0)}}
.workspace{padding:30px;overflow-y:auto;height:calc(100vh - 82px);background:rgba(0,0,0,0.2);}
.empty-notice{color:#003355;font-style:italic;margin-top:10px;}

/* ══ LIBRARY ══ */
.novel-summary-card{background:rgba(3,3,3,0.9);border:1px solid #0055aa;padding:24px;margin-bottom:20px;position:relative;cursor:pointer;transition:border-color 0.2s,background 0.2s,box-shadow 0.2s;}
.novel-summary-card:hover{border-color:var(--blue-glow);background:rgba(0,20,40,0.4);box-shadow:0 0 8px rgba(0,170,255,0.2);}
.novel-card-header{display:flex;align-items:flex-start;margin-bottom:14px;gap:10px;}
.novel-card-header-left{display:flex;align-items:flex-start;flex:1;min-width:0;}
.square-dot{width:8px;height:8px;background:var(--blue-glow);margin-right:12px;flex-shrink:0;margin-top:8px;}
.novel-card-title{font-size:1.6rem;font-weight:700;color:#fff;text-shadow:0 0 6px var(--blue),0 0 15px rgba(0,170,255,0.4);letter-spacing:1px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.novel-card-intro{font-size:0.95rem;font-weight:700;color:#0088cc;line-height:1.6;margin-bottom:25px;text-align:justify;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis;}
.novel-card-time{position:absolute;bottom:12px;right:16px;font-size:0.75rem;color:#004477;}
.novel-detail-view{max-width:800px;margin:0 auto;}
.back-to-list-btn{background:transparent;border:1px solid #003366;color:var(--blue-dim);padding:6px 14px;font-size:0.8rem;cursor:pointer;margin-bottom:20px;font-family:inherit;}
.back-to-list-btn:hover{border-color:var(--blue);color:var(--blue);}
.detail-title{font-size:2.2rem;font-weight:700;color:var(--blue-glow);margin-bottom:15px;text-shadow:0 0 8px var(--blue);}
.detail-section-label{font-size:1.2rem;font-weight:700;color:#004477;margin-top:20px;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;}
.detail-intro-box{font-size:1rem;font-weight:700;color:#0099dd;line-height:1.6;white-space:pre-wrap;margin-bottom:20px;background:rgba(5,5,5,0.6);padding:15px;border-left:2px solid #003366;text-align:justify;}
.star-rating-display{display:flex;gap:5px;font-size:1.2rem;color:#004477;margin-bottom:25px;}
.star-filled{color:#ffaa00;text-shadow:0 0 6px rgba(255,170,0,0.5);}
.chapters-scroll-box{background:rgba(2,2,2,0.9);border:1px solid #002244;height:280px;overflow-y:auto;padding:10px;margin-bottom:30px;}
.chapter-item-row{padding:12px 10px;border-bottom:1px solid #001122;cursor:pointer;transition:background 0.15s;}
.chapter-item-row:last-child{border-bottom:none;}
.chapter-item-row:hover{background:rgba(0,170,255,0.08);}
.chapter-item-name{font-size:0.95rem;font-weight:700;color:var(--blue);margin-bottom:4px;}
.chapter-item-time{font-size:0.75rem;color:#004466;}
.chapter-reader-view{max-width:850px;margin:0 auto;padding-bottom:60px;}
.reader-pathbar{font-size:0.8rem;color:#005599;border-bottom:1px dashed #002244;padding-bottom:8px;margin-bottom:20px;}
.reader-title-container{display:flex;flex-direction:column;align-items:flex-end;margin-bottom:35px;}
.reader-title{text-align:right;font-size:2.2rem;font-weight:700;color:var(--blue-glow);text-shadow:0 0 6px var(--blue);}
.reader-content{font-size:14px;font-weight:700;color:#0099ee;line-height:1.8;white-space:pre-wrap;margin-bottom:40px;text-align:justify;}
.reader-navigation{display:flex;justify-content:space-between;border-top:1px solid #002244;border-bottom:1px solid #002244;padding:12px 0;margin-bottom:25px;}
.nav-btn{background:transparent;border:1px solid #003366;color:var(--blue);padding:6px 20px;cursor:pointer;font-family:inherit;font-size:0.85rem;transition:all 0.2s;}
.nav-btn:hover:not(:disabled){border-color:var(--blue);box-shadow:0 0 6px rgba(0,170,255,0.2);}
.nav-btn:disabled{color:#002244;border-color:#001122;cursor:not-allowed;}
.end-thanks-box{background:rgba(4,12,24,0.6);border:1px solid #003366;padding:20px;margin-bottom:30px;font-size:0.85rem;color:#00aaff;font-style:italic;}

/* ══ STATUSBAR ══ */
.statusbar{border-top:1px solid #001122;padding:6px 20px;font-size:0.7rem;color:#003355;display:flex;justify-content:space-between;background:#000;}
.blink{animation:blink 1.1s step-end infinite;}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<div class="ambient-glow"></div>
<div class="ambient-glow-extra-left"></div>
<div class="ambient-glow-extra-right"></div>
<canvas id="starfield"></canvas>

<div id="landing">
  <div class="landing-title">Kokuu</div>
  <div class="landing-verse">Who you are</div>
  <div class="entry-form">
    <div class="entry-label">when you think about yourself</div>
    <input class="entry-input" id="nameInput" type="text" placeholder="your name" autocomplete="off" spellcheck="false"/>
    <button class="entry-btn" id="enterBtn">enter</button>
  </div>
</div>

<div id="site">
  <div class="topbar">
    <div class="topbar-title" onclick="handleTopbarHeartClick()">💙</div>
    <div class="topbar-user">you are <span id="displayName">—</span></div>
  </div>
  <div class="pathbar">
    <div class="marquee-inner">(^.^)(^-^)(^o^):-)＼(^^)／＼(^_^)／(^ー^)d=(^o^)=b(⌒‐⌒)( ＾ω＾ )( 　＾▽＾)( ￣▽￣)( ☆∀☆)(^.^)(^▽^)/★☆♪ &nbsp;&nbsp;&nbsp; ngày hôm nay ổn không? &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div>
  </div>

  <div class="workspace">
    <div id="novelCanvas"></div>
  </div>

  <div class="statusbar">
    <span>kokuu_terminal_v6.0 // <span class="blink">_</span></span>
    <span id="clock">00:00:00</span>
  </div>
</div>

<!-- Dữ liệu truyện: chỉnh sửa nội dung ở file data.js, KHÔNG cần sửa file này -->
<script src="data.js"></script>
<script>
// ══ STARFIELD ══
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let starOpacityMultiplier = 1;
const stars = Array.from({length:120}, () => ({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  size:Math.random()*1.8+0.3, speed:Math.random()*0.12+0.03, opacity:Math.random()*0.7+0.1
}));
function resizeCanvas(){canvas.width=innerWidth;canvas.height=innerHeight;}
window.addEventListener('resize',resizeCanvas); resizeCanvas();
(function animateStars(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for(const s of stars){
    ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,170,255,${s.opacity*starOpacityMultiplier})`; ctx.fill();
    s.y+=s.speed; if(s.y>canvas.height){s.y=0;s.x=Math.random()*canvas.width;}
  }
  requestAnimationFrame(animateStars);
})();

// ══ UTILITIES ══
function escapeHTML(str){
  if(!str) return '';
  return String(str).replace(/[&<>'"]/g,t=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[t]));
}
function $id(id){return document.getElementById(id);}

// ══ STATE (đọc từ data.js) ══
const works = Array.isArray(window.WORKS_DATA) ? window.WORKS_DATA : [];
let currentUser = "";
let activeBookIndex = null;
let isCurrentlyReading = false;

// ══ CLOCK ══
setInterval(()=>{ $id('clock').textContent = new Date().toLocaleTimeString('en-GB'); }, 1000);
$id('clock').textContent = new Date().toLocaleTimeString('en-GB');

// ══ LOGIN ══
function loginProcess(){
  const v = $id('nameInput').value.trim();
  currentUser = v || "anonymous";
  $id('displayName').textContent = currentUser;
  $id('landing').classList.add('hidden');
  setTimeout(()=>{
    $id('landing').style.display = 'none';
    $id('site').classList.add('visible');
    renderNovelSection();
  }, 600);
}
$id('enterBtn').addEventListener('click', loginProcess);
$id('nameInput').addEventListener('keydown', e=>{ if(e.key==='Enter') loginProcess(); });

// ══ TOPBAR HEART ══
function handleTopbarHeartClick(){
  if(isCurrentlyReading && activeBookIndex !== null){
    openNovelDetail(activeBookIndex);
  } else {
    returnToLanding();
  }
}

function returnToLanding(){
  $id('site').classList.remove('visible');
  const l = $id('landing');
  l.style.display = 'flex';
  setTimeout(()=>l.classList.remove('hidden'), 50);
  $id('nameInput').value = "";
  starOpacityMultiplier = 1;
  isCurrentlyReading = false;
  activeBookIndex = null;
}

// ══ HELPERS ══
function nowUnused(){} // giữ chỗ, không dùng

// ══ LIBRARY RENDER ══
function renderNovelSection(){
  const node = $id('novelCanvas');
  if(!works.length){
    node.innerHTML = '<div class="empty-notice">// The library is empty.</div>';
    return;
  }
  node.innerHTML = works.map((book, idx)=>`
    <div class="novel-summary-card" onclick="openNovelDetail(${idx})">
      <div class="novel-card-header">
        <div class="novel-card-header-left">
          <div class="square-dot"></div>
          <div class="novel-card-title">${escapeHTML(book.title)}</div>
        </div>
      </div>
      <div class="novel-card-intro">${escapeHTML(book.intro)}</div>
      <div class="novel-card-time">${escapeHTML(book.created_time)}</div>
    </div>`).join('');
}

// ══ NOVEL DETAIL ══
function openNovelDetail(workIdx){
  const book = works[workIdx];
  if(!book) return;
  isCurrentlyReading = false;
  activeBookIndex = workIdx;

  const bookChapters = book.chapters || [];
  const starStr = Array.from({length:5},(_,i)=>`<span class="${i<(book.stars||0)?'star-filled':''}">★</span>`).join('');

  const chaptersHtml = bookChapters.length
    ? bookChapters.map((c, cIdx)=>`
      <div class="chapter-item-row" onclick="openChapterReader(${workIdx},${cIdx})">
        <div class="chapter-item-name"><strong>${escapeHTML(c.title)}</strong></div>
        <div class="chapter-item-time">${escapeHTML(c.created_time)}</div>
      </div>`).join('')
    : '<div style="padding:15px;color:#003355;font-style:italic;">Chưa có chương nào.</div>';

  $id('novelCanvas').innerHTML=`
    <div class="novel-detail-view">
      <button class="back-to-list-btn" onclick="renderNovelSection()">← back to the library</button>
      <h1 class="detail-title">${escapeHTML(book.title)}</h1>
      <div class="detail-section-label">Giới thiệu tác phẩm</div>
      <div class="detail-intro-box">${escapeHTML(book.intro)}</div>
      <div class="detail-section-label">Đánh giá</div>
      <div class="star-rating-display">${starStr}</div>
      <div class="detail-section-label">Mục lục</div>
      <div class="chapters-scroll-box">${chaptersHtml}</div>
    </div>`;
}

// ══ CHAPTER READER ══
function openChapterReader(workIdx, chapIdx){
  const book = works[workIdx];
  const bookChapters = book ? (book.chapters || []) : [];
  const chap = bookChapters[chapIdx];
  if(!book || !chap) return;

  starOpacityMultiplier = 0.25;
  isCurrentlyReading = true;
  activeBookIndex = workIdx;

  const isLast = chapIdx === bookChapters.length - 1;
  const prevChap = chapIdx > 0 ? bookChapters[chapIdx-1] : null;
  const nextChap = !isLast ? bookChapters[chapIdx+1] : null;

  const endBox = isLast
    ? `<div class="end-thanks-box">Dù không biết bạn đã đọc hết hay chưa, vẫn cảm ơn vì đã dành thời gian đọc.🙇‍♀️</div>`
    : '';

  $id('novelCanvas').innerHTML=`
    <div class="chapter-reader-view">
      <div class="reader-pathbar">[ ${escapeHTML(book.title)} _ ${escapeHTML(chap.title)} ]</div>
      <button class="back-to-list-btn" style="margin-top:10px;" onclick="openNovelDetail(${workIdx})">← back to the library</button>
      <div class="reader-title-container">
        <h2 class="reader-title">${escapeHTML(chap.title)}</h2>
      </div>
      <div class="reader-content">${escapeHTML(chap.content)}</div>
      <div class="reader-navigation">
        <button class="nav-btn" ${!prevChap?'disabled':''} onclick="openChapterReader(${workIdx},${chapIdx-1})">PREV</button>
        <button class="nav-btn" ${!nextChap?'disabled':''} onclick="openChapterReader(${workIdx},${chapIdx+1})">NEXT</button>
      </div>
      ${endBox}
    </div>`;
}
</script>
</body>
</html>
